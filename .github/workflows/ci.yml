name: CI

on:
  push:
    branches: [main, Ayman-Branch]
  pull_request:
    branches: [main, Ayman-Branch]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest backend/tests_contracts -q --cov=backend --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8 isort black mypy

      - name: Check formatting (black)
        run: black --check --line-length 120 backend/

      - name: Check import order (isort)
        run: isort --check-only --profile black --line-length 120 backend/

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length 120 --ignore E501,W503,E203 --exclude __pycache__
