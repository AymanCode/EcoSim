<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSim Dashboard (Standalone)</title>
    
    <!-- Tailwind CSS (via CDN for local testing) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (via unpkg CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Mock Lucide React icons -->
    <script>
      // Lucide icons are not easily importable as React components from CDN in this setup without a bundler,
      // so we will create quick mock components for the icons used in App.jsx
      window.LucideReactMocks = {};
      const iconNames = ['Play', 'Pause', 'Settings', 'Terminal', 'Activity', 'Users', 'Building2', 'DollarSign', 'Zap', 'Save', 'RotateCcw', 'BarChart3', 'Globe', 'Triangle', 'Lock'];
      
      iconNames.forEach(name => {
        window.LucideReactMocks[name] = function(props) {
          return React.createElement('i', { 
            className: `lucide lucide-${name.toLowerCase()}`, 
            style: { width: props.size || 24, height: props.size || 24, display: 'inline-block' } 
          });
        };
      });
    </script>

    <style>
      body, html, #root { margin: 0; padding: 0; width: 100%; height: 100vh; background-color: #0b0c15; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Compile App.jsx and inject dependencies -->
    <script type="text/babel" data-presets="react,env" data-type="module">
        // 1. Setup mock imports for App.jsx so it doesn't fail on "import" statements
        const React = window.React;
        const { useState, useEffect, useRef } = React;
        
        // Mock the sub-components
        const NeuralAvatar = () => <div className="p-2 border border-sky-500/30 text-sky-500 text-xs">NeuralAvatar Mock</div>;
        const NeuralBuilding = () => <div className="p-2 border border-amber-500/30 text-amber-500 text-xs">NeuralBuilding Mock</div>;
        
        const { Play, Pause, Settings, Terminal, Activity, Users, Building2, DollarSign, Zap, Save, RotateCcw, BarChart3, Globe, Triangle, Lock } = window.LucideReactMocks;

        // 2. Fetch the actual App.jsx content
        fetch('./App.jsx')
            .then(response => response.text())
            .then(code => {
                // Remove the import/export statements to make it valid script code for this environment
                let cleanCode = code
                    .replace(/import .* from .*/g, '')
                    .replace(/export default function/g, 'function');
                
                // Transpile the JSX
                const compiledCode = Babel.transform(cleanCode, { presets: ['react', 'env'] }).code;
                
                // Execute the transpiled code
                const script = document.createElement('script');
                script.innerHTML = compiledCode + '\n\n// Render to DOM\nconst root = ReactDOM.createRoot(document.getElementById("root"));\nroot.render(React.createElement(EcoSimUI));\n\n// Initialize Lucide icons\nsetTimeout(() => lucide.createIcons(), 100);';
                document.body.appendChild(script);
            })
            .catch(err => console.error("Error loading App.jsx:", err));
    </script>
</body>
</html>
