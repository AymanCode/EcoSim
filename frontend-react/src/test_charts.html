<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSim Charts Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #0b0c15;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .font-display {
            font-family: 'Chakra Petch', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .chart-container {
            width: 100%;
            max-width: 600px;
            height: 250px;
            display: flex;
        }
    </style>
</head>

<body>
    <h1 class="text-2xl font-bold font-display text-sky-400 mb-4">Chart rendering tests</h1>

    <div class="flex flex-wrap gap-4">
        <!-- Wealth Distribution Container -->
        <div id="wealth-chart" class="chart-container"></div>

        <!-- Line Chart Container -->
        <div id="line-chart" class="chart-container"></div>
    </div>

    <script>
        // --- WEALTH INEQUALITY CHART (Vanilla JS) ---
        function renderWealthChart(containerId, gini, top10, bottom50) {
            const container = document.getElementById(containerId);

            const getCurrentColor = (g) => {
                if (g < 0.30) return "#10b981";
                if (g < 0.40) return "#84cc16";
                if (g < 0.50) return "#fbbf24";
                if (g < 0.60) return "#f97316";
                if (g < 0.70) return "#ef4444";
                return "#dc2626";
            };

            const currentColor = getCurrentColor(gini);
            const middle40 = 100 - top10 - bottom50;

            container.innerHTML = `
                <div class="flex-1 relative border border-slate-700/50 bg-slate-900/40 rounded flex flex-col min-h-[160px] p-3 overflow-hidden w-full">
                    <div class="flex justify-between items-start z-10">
                        <div>
                        <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Wealth Distribution</h4>
                        <div class="text-xl font-mono font-bold" style="color: ${currentColor}">
                            ${gini.toFixed(3)}
                        </div>
                        <div class="text-[9px] text-slate-500 uppercase">Gini Coefficient</div>
                        </div>
                    </div>

                    <div class="flex-1 flex items-end justify-between space-x-2 pt-8 pb-4 relative z-10">
                        <!-- Bottom 50 -->
                        <div class="flex flex-col items-center w-1/3">
                            <div class="w-full bg-slate-800 rounded-sm relative flex items-end justify-center" style="height: 80px">
                                <div class="w-full bg-emerald-500 rounded-sm transition-all duration-500 opacity-80" 
                                     style="height: ${Math.max(4, bottom50)}%"></div>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-2 text-center">
                                <div class="font-bold text-emerald-400">${bottom50.toFixed(1)}%</div>
                                <div>Bottom 50%</div>
                            </div>
                        </div>

                        <!-- Middle 40 -->
                        <div class="flex flex-col items-center w-1/3">
                            <div class="w-full bg-slate-800 rounded-sm relative flex items-end justify-center" style="height: 80px">
                                <div class="w-full bg-amber-500 rounded-sm transition-all duration-500 opacity-80" 
                                     style="height: ${Math.max(4, middle40)}%"></div>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-2 text-center">
                                <div class="font-bold text-amber-400">${middle40.toFixed(1)}%</div>
                                <div>Middle 40%</div>
                            </div>
                        </div>

                        <!-- Top 10 -->
                        <div class="flex flex-col items-center w-1/3">
                            <div class="w-full bg-slate-800 rounded-sm relative flex items-end justify-center" style="height: 80px">
                                <div class="w-full bg-rose-500 rounded-sm transition-all duration-500 opacity-80 shadow-[0_0_10px_rgba(244,63,94,0.3)]" 
                                     style="height: ${Math.max(4, top10)}%"></div>
                            </div>
                            <div class="text-[9px] text-slate-400 mt-2 text-center">
                                <div class="font-bold text-rose-400">${top10.toFixed(1)}%</div>
                                <div>Top 10%</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Background Decor -->
                    <div class="absolute top-0 right-0 w-32 h-32 bg-sky-500/5 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
                </div>
            `;
        }

        // --- LINE CHART (Vanilla JS) ---
        function renderLineChart(containerId, title, datasets, colors, minScale = 0, suffix = "") {
            const container = document.getElementById(containerId);

            if (!datasets || !datasets[0] || datasets[0].length < 2) {
                container.innerHTML = '<div class="flex-1 flex items-center justify-center text-slate-600 font-mono text-xs border border-slate-700/50 bg-slate-900/40 rounded min-h-[140px]">WAITING FOR DATA</div>';
                return;
            }

            const allValues = datasets.flatMap(d => d.map(p => p.value));
            let minVal = Math.min(...allValues, minScale);
            let maxVal = Math.max(...allValues, minScale + 0.1);

            const rawRange = maxVal - minVal || 1;
            const padding = maxVal === minVal ? 1 : rawRange * 0.15;
            minVal -= padding;
            maxVal += padding;
            const range = maxVal - minVal || 1;

            const lastValue = datasets[0][datasets[0].length - 1].value;
            const zeroY = 100 - ((0 - minVal) / range) * 100;
            const isZeroLineVisible = zeroY >= 0 && zeroY <= 100;

            let gridLinesSVG = [20, 40, 60, 80].map(p =>
                `<line x1="0" y1="${p}" x2="100" y2="${p}" stroke="#334155" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.5"/>`
            ).join('');

            let zeroLineSVG = isZeroLineVisible ?
                `<line x1="0" y1="${zeroY}" x2="100" y2="${zeroY}" stroke="#475569" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>` : '';

            let dataLinesSVG = datasets.map((dataset, dIdx) => {
                const lineColor = colors[dIdx % colors.length];
                const coords = dataset.map((point, i) => {
                    const x = (i / (dataset.length - 1)) * 100;
                    const y = 100 - ((point.value - minVal) / range) * 100;
                    return { x, y };
                });
                const pointsStr = coords.map(c => \`\${c.x},\${c.y}\`).join(' ');
                
                let areaSVG = '';
                if (dIdx === 0) {
                    const areaPoints = \`0,100 \${pointsStr} 100,100\`;
                    areaSVG = \`<polygon points="\${areaPoints}" fill="url(#grad-\${title.replace(/\\s+/g, '')})" />\`;
                }

                return \`
                    <g>
                        \${areaSVG}
                        <polyline points="\${pointsStr}" fill="none" stroke="\${lineColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" />
                    </g>
                \`;
            }).join('');

            // To keep vanilla JS simple, we'll build the tooltips as static visible dots instead of complex react hover state
            let dotsHTML = datasets[0].map((point, i) => {
                const x = (i / (datasets[0].length - 1)) * 100;
                const y = Math.max(5, Math.min(95, 100 - ((point.value - minVal) / range) * 100));
                return \`
                    <div class="absolute w-2 h-2 rounded-full pointer-events-none bg-slate-900 border-2" 
                         style="left: \${x}%; top: \${y}%; border-color: \${colors[0]}; box-shadow: 0 0 5px \${colors[0]}80; transform: translate(-50%, -50%)">
                    </div>
                \`;
            }).join('');

            container.innerHTML = \`
                <div class="flex-1 group relative border border-slate-700/50 rounded bg-slate-900/40 flex flex-col min-h-[180px] overflow-visible w-full">
                    <div class="px-3 pt-3 flex justify-between items-start z-10 pointer-events-none">
                        <div>
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">\${title}</h4>
                            <div class="text-xl font-mono font-bold text-slate-200">
                                \${lastValue.toFixed(1)}<span class="text-sm text-slate-500 ml-0.5">\${suffix}</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex-1 relative w-full h-full mt-2 px-1 pb-1">
                        <svg class="w-full h-full" preserveAspectRatio="none" viewBox="0 0 100 100">
                            <defs>
                                <linearGradient id="grad-\${title.replace(/\\s+/g, '')}" x1="0" x2="0" y1="0" y2="1">
                                    <stop offset="0%" stopColor="\${colors[0]}" stopOpacity="0.2"/>
                                    <stop offset="100%" stopColor="\${colors[0]}" stopOpacity="0.0"/>
                                </linearGradient>
                            </defs>
                            \${gridLinesSVG}
                            \${zeroLineSVG}
                            \${dataLinesSVG}
                        </svg>
                        <div class="absolute inset-0 pl-1 pr-1 pb-1 pt-0 pointer-events-none">
                            \${dotsHTML}
                        </div>
                    </div>
                </div>
            \`;
        }

        // --- RENDER TEST DATA ---
        window.onload = () => {
            renderWealthChart('wealth-chart', 0.45, 30.5, 15.2);
            
            const dummyData = [
                [{value: 10}, {value: 15}, {value: 8}, {value: 22}, {value: 30}, {value: 28}, {value: 45}]
            ];
            renderLineChart('line-chart', 'Unemployment', dummyData, ['#38bdf8'], 0, '%');
        };
    </script>
</body>

</html>
