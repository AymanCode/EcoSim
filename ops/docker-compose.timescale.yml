services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: ecosim-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecosim
      POSTGRES_USER: ecosim
      POSTGRES_PASSWORD: ecosim
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecosim -d ecosim"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  timescale_data:
